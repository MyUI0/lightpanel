name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如 v1.0.5)'
        required: true
        default: 'v1.0.5'
      release:
        description: '发布到 GitHub Release'
        type: boolean
        default: true

permissions:
  contents: write

env:
  VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  create-tag:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f ${{ env.VERSION }}
          git push origin ${{ env.VERSION }} -f

  build:
    needs: create-tag
    if: always()
    strategy:
      fail-fast: false
      matrix:
        target:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ env.VERSION }}
      - name: Setup Go environment
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Install dependencies
        run: |
          go env -w GOPROXY=https://goproxy.cn,direct
          go clean -modcache
          go get -d ./...
          go mod tidy
      - name: Build binary
        env:
          GOOS: ${{ matrix.target.os }}
          GOARCH: ${{ matrix.target.arch }}
          CGO_ENABLED: 0
        run: |
          BIN="lightpanel"
          PKG="${BIN}-${{ env.VERSION }}-${{ matrix.target.os }}-${{ matrix.target.arch }}"
          go build -ldflags="-s -w -X lightpanel/config.Version=${{ env.VERSION }}" -o $BIN .
          mkdir -p $PKG
          mv $BIN $PKG/
          tar -czf $PKG.tar.gz $PKG
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target.os }}-${{ matrix.target.arch }}
          path: "*.tar.gz"

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.release == true)
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Create install script
        run: |
          cat > install.sh << 'EOF'
          #!/bin/bash
          set -e
          INSTALL_DIR="/opt/lightpanel"
          ARCH=$(uname -m)
          case $ARCH in
            x86_64) ARCH_NAME="amd64" ;;
            aarch64|arm64) ARCH_NAME="arm64" ;;
            *) echo "❌ 不支持的架构: $ARCH"; exit 1 ;;
          esac
          VERSION=${1:-latest}
          REPO=${{ github.repository }}

          echo "============================================"
          echo "📦 安装 LightPanel 到: $INSTALL_DIR"
          echo "============================================"

          mkdir -p "$INSTALL_DIR"
          cd "$INSTALL_DIR"

          echo "⬇️  下载中..."
          curl -L "https://gh.llkk.cc/https://github.com/$REPO/releases/download/$VERSION/lightpanel-$VERSION-linux-$ARCH_NAME.tar.gz" -o lightpanel.tar.gz

          echo "📂 解压中..."
          tar -xzf lightpanel.tar.gz --strip-components=1

          echo "🔐 赋予执行权限..."
          chmod +x lightpanel

          rm -rf lightpanel.tar.gz

          echo "============================================"
          echo "✅ 安装完成！"
          echo "📂 路径: $INSTALL_DIR"
          echo "🌐 访问: http://127.0.0.1:31956"
          echo "🔐 账号: admin / admin"
          echo "============================================"

          echo "🚀 启动程序..."
          cd "$INSTALL_DIR" && ./lightpanel
          EOF
          chmod +x install.sh
      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          files: |
            artifacts/*.tar.gz
            install.sh
          body: |
            ## LightPanel ${{ env.VERSION }}
            ### 一键安装（自动安装到 /opt/lightpanel）
            ```bash
            curl -L https://gh.llkk.cc/https://github.com/${{ github.repository }}/releases/download/${{ env.VERSION }}/install.sh | bash -s ${{ env.VERSION }}
