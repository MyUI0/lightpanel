name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如 v1.0.5)'
        required: true
        default: 'v1.0.5'
      release:
        description: '发布到 GitHub Release'
        type: boolean
        default: true

permissions:
  contents: write  # 允许创建标签和发布

env:
  VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}

jobs:
  # 手动触发时自动创建 Git 标签（修复核心！）
  create-tag:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create Git Tag
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ env.VERSION }}
          git push origin ${{ env.VERSION }}

  build:
    needs: create-tag  # 手动触发需先创建tag
    if: always()
    strategy:
      matrix:
        target:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.VERSION }}  # 切换到对应版本

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Set Go proxy
        run: |
          go env -w GOPROXY=https://goproxy.cn,direct
          go env -w GOSUMDB=off

      - name: Build
        env:
          GOOS: ${{ matrix.target.os }}
          GOARCH: ${{ matrix.target.arch }}
          CGO_ENABLED: 0
        run: |
          BIN_NAME="lightpanel"
          PKG_NAME="${BIN_NAME}-${{ env.VERSION }}-${{ matrix.target.os }}-${{ matrix.target.arch }}"
          go build -ldflags="-s -w -X lightpanel/config.Version=${{ env.VERSION }}" -o "${BIN_NAME}" .
          mkdir -p "${PKG_NAME}"
          mv "${BIN_NAME}" "${PKG_NAME}/"
          tar -czf "${PKG_NAME}.tar.gz" "${PKG_NAME}"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target.os }}-${{ matrix.target.arch }}
          path: lightpanel-*.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.release == true)
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Installer Script
        run: |
          cat > install.sh << 'INSTALL_SCRIPT'
          #!/bin/bash
          set -e
          ARCH=$(uname -m)
          case $ARCH in
            x86_64) ARCH_NAME="amd64" ;;
            aarch64|arm64) ARCH_NAME="arm64" ;;
            *) echo "❌ 不支持的架构: $ARCH"; exit 1 ;;
          esac
          VERSION=${1:-latest}
          REPO=${GITHUB_REPOSITORY}
          echo "📦 下载 LightPanel $VERSION ($ARCH_NAME)..."
          curl -L "https://github.com/$REPO/releases/download/$VERSION/lightpanel-$VERSION-linux-$ARCH_NAME.tar.gz" -o lightpanel.tar.gz
          tar -xzf lightpanel.tar.gz --strip-components=1
          chmod +x lightpanel
          rm -f lightpanel.tar.gz
          echo "✅ 安装完成！运行: ./lightpanel"
          INSTALL_SCRIPT
          chmod +x install.sh

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag: ${{ env.VERSION }}  # 强制指定标签（核心修复）
          files: |
            artifacts/*.tar.gz
            install.sh
          body: |
            ## LightPanel ${{ env.VERSION }}
            ### 一键安装
            ```bash
            curl -L https://github.com/${{ github.repository }}/raw/main/install.sh | bash -s ${{ env.VERSION }}
