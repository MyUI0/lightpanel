name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如 v1.0.5)'
        required: true
        default: 'v1.0.5'
      release:
        description: '发布到 GitHub Release'
        type: boolean
        default: true

permissions:
  contents: write

env:
  VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  create-tag:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f ${{ env.VERSION }}
          git push origin ${{ env.VERSION }} -f

  build:
    needs: create-tag
    if: always()
    strategy:
      fail-fast: false
      matrix:
        target:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ env.VERSION }}

      - name: Setup Go environment
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install dependencies
        run: |
          go env -w GOPROXY=https://goproxy.cn,direct
          go clean -modcache
          go get -d ./...
          go mod tidy
          go mod verify

      - name: Build binary
        env:
          GOOS: ${{ matrix.target.os }}
          GOARCH: ${{ matrix.target.arch }}
          CGO_ENABLED: 0
        run: |
          BIN="lightpanel"
          PKG="${BIN}-${{ env.VERSION }}-${{ matrix.target.os }}-${{ matrix.target.arch }}"
          go build -ldflags="-s -w -X lightpanel/config.Version=${{ env.VERSION }}" -o $BIN .
          mkdir -p $PKG
          mv $BIN $PKG/
          tar -czf $PKG.tar.gz $PKG

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target.os }}-${{ matrix.target.arch }}
          path: "*.tar.gz"

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.release == true)
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create install script
        run: |
          cat > install.sh << 'EOF'
          #!/bin/bash
          set -e
          ARCH=$(uname -m)
          case $ARCH in
            x86_64) ARCH=amd64 ;;
            aarch64|arm64) ARCH=arm64 ;;
            *) echo "不支持的架构" && exit 1 ;;
          esac
          VERSION=${1:-latest}
          REPO=${{ github.repository }}
          curl -L "https://github.com/${REPO}/releases/download/${VERSION}/lightpanel-${VERSION}-linux-${ARCH}.tar.gz" -o lp.tar.gz
          tar -xzf lp.tar.gz --strip-components=1
          chmod +x lightpanel
          rm -f lp.tar.gz
          echo "安装完成！运行命令: ./lightpanel"
          echo "面板地址: http://127.0.0.1:31956"
          echo "默认账号: admin / admin"
          EOF
          chmod +x install.sh

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag: ${{ env.VERSION }}
          files: |
            artifacts/*.tar.gz
            install.sh
          body: |
            ## LightPanel ${{ env.VERSION }}
            ### 一键自动安装
            ```bash
            curl -L https://github.com/${{ github.repository }}/raw/main/install.sh | bash -s ${{ env.VERSION }}
