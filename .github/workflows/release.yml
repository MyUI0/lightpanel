name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如 v1.0.5)'
        required: true
        default: 'v1.0.5'
      release:
        description: '发布到 GitHub Release'
        type: boolean
        default: true

permissions:
  contents: write

env:
  VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}

jobs:
  build:
    strategy:
      matrix:
        target:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Set Go proxy
        run: |
          go env -w GOPROXY=https://goproxy.cn,direct
          go env -w GOSUMDB=off

      - name: Download dependencies
        run: |
          go clean -modcache
          go mod tidy

      - name: Build
        env:
          GOOS: ${{ matrix.target.os }}
          GOARCH: ${{ matrix.target.arch }}
          CGO_ENABLED: 0
        run: |
          # 定义文件名
          BIN_NAME="lightpanel"
          PKG_NAME="${BIN_NAME}-${{ env.VERSION }}-${{ matrix.target.os }}-${{ matrix.target.arch }}"
          # 编译二进制
          go build -ldflags="-s -w -X lightpanel/config.Version=${{ env.VERSION }}" -o "${BIN_NAME}" .
          # 创建打包目录（避免和二进制同名冲突）
          mkdir -p "${PKG_NAME}"
          mv "${BIN_NAME}" "${PKG_NAME}/"
          # 打包压缩
          tar -czf "${PKG_NAME}.tar.gz" "${PKG_NAME}"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target.os }}-${{ matrix.target.arch }}
          path: lightpanel-*.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.release == true)
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Installer Script
        run: |
          cat > install.sh << 'INSTALL_SCRIPT'
          #!/bin/bash
          set -e
          
          # 检测系统架构
          ARCH=$(uname -m)
          case $ARCH in
            x86_64) ARCH_NAME="amd64" ;;
            aarch64|arm64) ARCH_NAME="arm64" ;;
            *) echo "❌ 不支持的架构: $ARCH"; exit 1 ;;
          esac
          
          # 版本设置
          VERSION=${1:-latest}
          REPO=${GITHUB_REPOSITORY:-${{ github.repository }}}
          
          echo "📦 正在下载 LightPanel ${VERSION} (${ARCH_NAME})..."
          curl -L "https://github.com/${REPO}/releases/download/${VERSION}/lightpanel-${VERSION}-linux-${ARCH_NAME}.tar.gz" -o lightpanel.tar.gz
          
          echo "📂 正在解压文件..."
          tar -xzf lightpanel.tar.gz --strip-components=1
          chmod +x lightpanel
          rm -rf lightpanel.tar.gz
          
          echo "✅ 安装完成！"
          echo "▶️  运行命令: ./lightpanel"
          echo "🌐 访问地址: http://127.0.0.1:31956"
          echo "🔐 默认账号: admin / admin"
          INSTALL_SCRIPT
          chmod +x install.sh

      - name: Release to GitHub
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.tar.gz
            install.sh
          body: |
            ## LightPanel ${{ env.VERSION }}

            ### 一键自动安装 (推荐)
            ```bash
            curl -L https://github.com/${{ github.repository }}/raw/main/install.sh | bash -s ${{ env.VERSION }}
