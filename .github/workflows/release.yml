name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如 v1.0.5)'
        required: true
        default: 'v1.0.5'
      release:
        description: '发布到 GitHub Release'
        type: boolean
        default: true

permissions:
  contents: write

env:
  VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  create-tag:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f ${{ env.VERSION }}
          git push origin ${{ env.VERSION }} -f

  build:
    needs: create-tag
    if: always()
    strategy:
      fail-fast: false
      matrix:
        target:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64

    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ env.VERSION }}

      - name: Setup Go environment
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install dependencies
        run: |
          go env -w GOPROXY=https://goproxy.cn,direct
          go mod tidy

      - name: Build binary
        env:
          GOOS: ${{ matrix.target.os }}
          GOARCH: ${{ matrix.target.arch }}
          CGO_ENABLED: 0
        run: |
          BIN="lightpanel"
          PKG="${BIN}-${{ env.VERSION }}-${{ matrix.target.os }}-${{ matrix.target.arch }}"
          go build -ldflags="-s -w -X lightpanel/config.Version=${{ env.VERSION }}" -o $BIN .
          mkdir -p $PKG
          mv $BIN $PKG/
          tar -czf $PKG.tar.gz $PKG

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target.os }}-${{ matrix.target.arch }}
          path: "*.tar.gz"

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.release == true)

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create install script
        run: |
          python3 << 'PYEOF'
          content = '''#!/bin/bash
          
          set -e
          
          INSTALL_DIR="/opt/lightpanel"
          BIN_NAME="lightpanel"
          REPO="${{ github.repository }}"
          
          # 权限检查
          if [ "$(id -u)" != "0" ]; then
              echo "请使用 root 权限运行"
              exit 1
          fi
          
          # 系统检查
          if [ "$(uname -s)" != "Linux" ]; then
              echo "仅支持 Linux"
              exit 1
          fi
          
          # 架构检测
          ARCH=$(uname -m)
          case $ARCH in
              x86_64)
                  ARCH_NAME="amd64"
                  ;;
              aarch64|arm64)
                  ARCH_NAME="arm64"
                  ;;
              *)
                  echo "不支持架构: $ARCH"
                  exit 1
                  ;;
          esac
          
          VERSION="${1:-latest}"
          
          echo "============================================"
          if [ -f "${INSTALL_DIR}/${BIN_NAME}" ]; then
              echo "已安装，执行覆盖更新"
          else
              echo "未安装，执行初次部署"
          fi
          echo "============================================"
          
          # 预检测 systemd (提前检测，为后面停止进程做准备)
          HAS_SYSTEMD=false
          if pidof systemd >/dev/null 2>&1 && command -v systemctl >/dev/null 2>&1; then
              HAS_SYSTEMD=true
          fi
          
          # 部署程序
          mkdir -p "$INSTALL_DIR"
          cd "$INSTALL_DIR"
          
          # ==========================================
          # 更新前：先停止正在运行的程序
          # ==========================================
          echo "准备更新，先停止旧进程..."
          if [ "$HAS_SYSTEMD" = true ] && [ -f "/etc/systemd/system/${BIN_NAME}.service" ]; then
              systemctl stop $BIN_NAME 2>/dev/null || true
          else
              # 非 systemd 环境，尝试杀掉进程
              pkill -f "$INSTALL_DIR/$BIN_NAME" 2>/dev/null || true
              sleep 1 # 等待 1 秒确保进程退出
              # 强制清理（如果还没退出）
              pkill -9 -f "$INSTALL_DIR/$BIN_NAME" 2>/dev/null || true
          fi
          
          # ==========================================
          # 下载并覆盖文件
          # ==========================================
          echo "下载程序..."
          curl -L "https://gh.llkk.cc/https://github.com/$REPO/releases/download/$VERSION/${BIN_NAME}-$VERSION-linux-$ARCH_NAME.tar.gz" -o ${BIN_NAME}.tar.gz
          tar -xzf ${BIN_NAME}.tar.gz --strip-components=1
          chmod +x $BIN_NAME
          rm -f ${BIN_NAME}.tar.gz
          
          # ==========================================
          # 启动程序（无论新装还是更新）
          # ==========================================
          if [ "$HAS_SYSTEMD" = true ]; then
              echo "检测到 systemd，配置并启动服务"
              
              if [ ! -f "/etc/systemd/system/${BIN_NAME}.service" ]; then
                  cat > /etc/systemd/system/${BIN_NAME}.service << 'SYSTEMDEND'
          [Unit]
          Description=LightPanel
          After=network.target
          
          [Service]
          WorkingDirectory=/opt/lightpanel
          ExecStart=/opt/lightpanel/lightpanel
          Restart=always
          RestartSec=3
          
          [Install]
          WantedBy=multi-user.target
          SYSTEMDEND
                  systemctl daemon-reload
                  systemctl enable $BIN_NAME
              fi
              
              echo "启动服务..."
              systemctl restart $BIN_NAME
          else
              echo "无 systemd，后台启动程序"
              # 简单的后台启动（注意：这种方式重启后不会自启，仅作为临时方案）
              nohup "$INSTALL_DIR/$BIN_NAME" > /dev/null 2>&1 &
          fi
          
          echo "============================================"
          echo "部署完成"
          echo "路径：$INSTALL_DIR/$BIN_NAME"
          echo "访问：http://127.0.0.1:31956"
          echo "默认：admin / admin"
          
          if [ "$HAS_SYSTEMD" = true ]; then
              echo "服务：systemctl status|restart $BIN_NAME"
          fi
          
          if [ "$HAS_SYSTEMD" = false ]; then
              echo "启动：cd $INSTALL_DIR && ./$BIN_NAME"
          fi
          echo "============================================"
          
          # 容器环境前台运行
          if [ -f "/.dockerenv" ] || [ -f "/.containerenv" ]; then
              echo "容器环境，前台启动程序"
              exec "$INSTALL_DIR/$BIN_NAME"
          fi
          '''
          
          with open('install.sh', 'w') as f:
              f.write(content)
          
          import os
          os.chmod('install.sh', 0o755)
          PYEOF

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          files: |
            artifacts/*.tar.gz
            install.sh
          body: |
            ## LightPanel ${{ env.VERSION }}
            
            ### 一键安装
            ```bash
            curl -L https://gh.llkk.cc/https://github.com/${{ github.repository }}/releases/download/${{ env.VERSION }}/install.sh | bash -s ${{ env.VERSION }}
