name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如 v1.0.5)'
        required: true
        default: 'v1.0.5'
      release:
        description: '发布到 GitHub Release'
        type: boolean
        default: true

permissions:
  contents: write

env:
  VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  create-tag:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f ${{ env.VERSION }}
          git push origin ${{ env.VERSION }} -f

  build:
    needs: create-tag
    if: always()
    strategy:
      fail-fast: false
      matrix:
        target:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64

    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ env.VERSION }}

      - name: Setup Go environment
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install dependencies
        run: |
          go env -w GOPROXY=https://goproxy.cn,direct
          go mod tidy

      - name: Build binary
        env:
          GOOS: ${{ matrix.target.os }}
          GOARCH: ${{ matrix.target.arch }}
          CGO_ENABLED: 0
        run: |
          BIN="lightpanel"
          PKG="${BIN}-${{ env.VERSION }}-${{ matrix.target.os }}-${{ matrix.target.arch }}"
          go build -ldflags="-s -w -X lightpanel/config.Version=${{ env.VERSION }}" -o $BIN .
          mkdir -p $PKG
          mv $BIN $PKG/
          tar -czf $PKG.tar.gz $PKG

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target.os }}-${{ matrix.target.arch }}
          path: "*.tar.gz"

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.release == true)

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create auto init install script
        run: |
          python3 << 'PYEOF'
          content = '''#!/bin/bash
          
          set -e
          
          INSTALL_DIR="/opt/lightpanel"
          BIN_NAME="lightpanel"
          REPO="${{ github.repository }}"
          
          if [ "$(id -u)" != "0" ]; then
              echo "请使用 root 权限运行"
              exit 1
          fi
          
          if [ "$(uname -s)" != "Linux" ]; then
              echo "仅支持 Linux"
              exit 1
          fi
          
          ARCH=$(uname -m)
          case $ARCH in
              x86_64) ARCH_NAME="amd64" ;;
              aarch64|arm64) ARCH_NAME="arm64" ;;
              *) echo "不支持架构: $ARCH"; exit 1 ;;
          esac
          
          VERSION="${1:-latest}"
          
          echo "============================================"
          if [ -f "${INSTALL_DIR}/${BIN_NAME}" ]; then
              echo "已安装，执行覆盖更新"
          else
              echo "未安装，执行初次部署"
          fi
          echo "============================================"
          
          mkdir -p "$INSTALL_DIR"
          cd "$INSTALL_DIR"
          
          echo "下载程序..."
          curl -L "https://gh.llkk.cc/https://github.com/$REPO/releases/download/$VERSION/${BIN_NAME}-$VERSION-linux-$ARCH_NAME.tar.gz" -o ${BIN_NAME}.tar.gz
          tar -xzf ${BIN_NAME}.tar.gz --strip-components=1
          chmod +x $BIN_NAME
          rm -f ${BIN_NAME}.tar.gz
          
          detect_init() {
              PID1=$(basename $(readlink /proc/1/exe 2>/dev/null || cat /proc/1/comm 2>/dev/null))
          
              case "$PID1" in
                  systemd)
                      echo "systemd"
                      return
                      ;;
                  openrc-init|openrc)
                      echo "openrc"
                      return
                      ;;
                  runit)
                      echo "runit"
                      return
                      ;;
                  sysvinit|init)
                      if command -v openrc >/dev/null 2>&1; then
                          echo "openrc"
                      elif command -v service >/dev/null 2>&1 && [ -d /etc/init.d ]; then
                          echo "sysvinit"
                      fi
                      return
                      ;;
              esac
          
              if echo "$PREFIX" | grep -q termux; then
                  echo "termux"
                  return
              fi
          
              echo "none"
          }
          
          INIT_SYSTEM=$(detect_init)
          echo "检测到系统init: $INIT_SYSTEM"
          
          case $INIT_SYSTEM in
              systemd)
                  echo "配置 systemd 服务..."
                  cat > /etc/systemd/system/${BIN_NAME}.service << 'SYSTEMD'
          [Unit]
          Description=LightPanel
          After=network.target
          
          [Service]
          WorkingDirectory=/opt/lightpanel
          ExecStart=/opt/lightpanel/lightpanel
          Restart=always
          RestartSec=3
          
          [Install]
          WantedBy=multi-user.target
          SYSTEMD
                  systemctl daemon-reload
                  systemctl enable --now $BIN_NAME
                  ;;
              
              openrc)
                  echo "配置 OpenRC 服务(Alpine)..."
                  cat > /etc/init.d/$BIN_NAME << 'OPENRC'
          #!/sbin/openrc-run
          
          name="LightPanel"
          command="/opt/lightpanel/lightpanel"
          command_background="yes"
          pidfile="/run/$BIN_NAME.pid"
          command_user="root"
          
          depend() {
              use net
          }
          OPENRC
                  chmod +x /etc/init.d/$BIN_NAME
                  rc-update add $BIN_NAME default
                  rc-service $BIN_NAME restart
                  ;;
              
              sysvinit)
                  echo "配置 SysVinit 服务..."
                  cat > /etc/init.d/$BIN_NAME << 'SYSV'
          #!/bin/bash
          ### BEGIN INIT INFO
          # Provides:          lightpanel
          # Required-Start:    $network
          # Required-Stop:     $network
          # Default-Start:     2 3 4 5
          # Default-Stop:      0 1 6
          # Short-Description: LightPanel Service
          ### END INIT INFO
          
          PIDFILE="/var/run/lightpanel.pid"
          cd /opt/lightpanel
          
          case "$1" in
              start)
                  setsid ./lightpanel > /dev/null 2>&1 &
                  echo $! > $PIDFILE
                  echo "启动成功"
                  ;;
              stop)
                  if [ -f $PIDFILE ]; then
                      kill $(cat $PIDFILE) 2>/dev/null
                      rm -f $PIDFILE
                      echo "已停止"
                  fi
                  ;;
              restart)
                  $0 stop
                  $0 start
                  ;;
          esac
          SYSV
                  chmod +x /etc/init.d/$BIN_NAME
                  update-rc.d $BIN_NAME defaults 99
                  service $BIN_NAME restart
                  ;;
              
              runit)
                  echo "配置 Runit 服务..."
                  mkdir -p /etc/service/$BIN_NAME
                  cat > /etc/service/$BIN_NAME/run << 'RUNIT'
          #!/bin/bash
          cd /opt/lightpanel
          exec ./lightpanel 2>&1
          RUNIT
                  chmod +x /etc/service/$BIN_NAME/run
                  ;;
              
              termux)
                  echo "配置 Termux 服务..."
                  mkdir -p $PREFIX/var/service/$BIN_NAME
                  cat > $PREFIX/var/service/$BIN_NAME/run << 'TERMUX'
          #!/data/data/com.termux/files/usr/bin/bash
          cd /opt/lightpanel
          exec ./lightpanel 2>&1
          TERMUX
                  chmod +x $PREFIX/var/service/$BIN_NAME/run
                  ln -sf $PREFIX/var/service/$BIN_NAME $PREFIX/var/service/run/
                  ;;
              
              none)
                  echo "无init系统，使用 setsid 后台保活..."
                  pkill -f $BIN_NAME 2>/dev/null || true
                  setsid ./$BIN_NAME > /dev/null 2>&1 &
                  echo "已使用 setsid 永久保活，关闭终端不退出"
                  ;;
          esac
          
          echo "============================================"
          echo "部署完成"
          echo "安装路径：$INSTALL_DIR"
          echo "访问地址：http://127.0.0.1:31956"
          echo "默认账号：admin / admin"
          echo "============================================"
          
          if [ -f "/.dockerenv" ] || [ -f "/.containerenv" ]; then
              echo "容器环境，前台启动程序"
              exec "$INSTALL_DIR/$BIN_NAME"
          fi
          '''
          
          with open('install.sh', 'w') as f:
              f.write(content)
          
          import os
          os.chmod('install.sh', 0o755)
          PYEOF

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          files: |
            artifacts/*.tar.gz
            install.sh
          body: |
            ## LightPanel ${{ env.VERSION }}
            
            ### 一键安装（自动适配所有系统/架构/init）
            ```bash
            curl -L https://gh.llkk.cc/https://github.com/${{ github.repository }}/releases/download/${{ env.VERSION }}/install.sh | bash -s ${{ env.VERSION }}
